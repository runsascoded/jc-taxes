<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      (function() {
        var mode = localStorage.getItem('jc-taxes-theme') || 'dark'
        var theme = mode
        if (mode === 'system')
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
    <title>JC Property Taxes — Interactive Map</title>
    <meta property="og:title" content="JC Property Taxes — Map of Taxes Paid per Sqft" />
    <meta property="og:description" content="Map of Jersey City property taxes paid, per sqft / per year. Exposed as 3D bar heights on a block, lot, or unit level, with customizable color gradient." />
    <meta property="og:image" content="https://jct.rbw.sh/og-lot.png" />
    <meta property="og:url" content="https://jct.rbw.sh/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
